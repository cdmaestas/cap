name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find . -not -path './.git/*' -not -path './src/*' \
            \( -name '*.sh' -o -name 'cfunc' -o -name 'deploy' \) \
            -print0 | xargs -0 shellcheck

  macos-compat:
    name: macOS shell compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Run shellcheck
        run: |
          find . -not -path './.git/*' -not -path './src/*' \
            \( -name '*.sh' -o -name 'cfunc' -o -name 'deploy' \) \
            -print0 | xargs -0 shellcheck

