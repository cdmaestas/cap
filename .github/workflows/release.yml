name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-packages:
    name: Build and sign packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: sudo apt-get install -y rpm rpmsign dpkg-dev shellcheck

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          RPM_VER="${TAG//-/.}"
          echo "VERSION=$TAG" >> "$GITHUB_ENV"
          echo "RPM_VERSION=$RPM_VER" >> "$GITHUB_ENV"
          # Patch cap.spec Version: line (RPM forbids '-'; use '.')
          awk -v v="Version:      $RPM_VER" \
            '/^Version:/{print v; next} 1' cap.spec > /tmp/_spec && mv /tmp/_spec cap.spec
          # Patch debian/DEBIAN/control Version: line
          awk -v v="Version: $TAG-1" \
            '/^Version:/{print v; next} 1' \
            debian/DEBIAN/control > /tmp/_ctrl && mv /tmp/_ctrl debian/DEBIAN/control

      - name: Build RPM
        env:
          CAP5DEVHOME: ${{ github.workspace }}
        run: |
          mkdir -p dist
          ./build-cap5.sh official rpm
          find ~/redhat/RPMS -name "*.rpm" -exec cp {} dist/ \; 2>/dev/null || \
          find ~/.rpmbuild/RPMS  -name "*.rpm" -exec cp {} dist/ \; 2>/dev/null || true

      - name: Build DEB
        env:
          CAP5DEVHOME: ${{ github.workspace }}
        run: |
          mkdir -p dist
          ./build-cap5.sh official deb
          find . -maxdepth 1 -name "*.deb" -exec mv {} dist/ \;

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG 2>/dev/null \
            | grep "^sec" | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          printf '%%_gpg_name %s\n%%__gpg /usr/bin/gpg\n%%__gpg_sign_cmd %%{__gpg} gpg --batch --no-verbose --no-armor --no-secmem-warning -u "%%{_gpg_name}" -sbo %%{__signature_filename} --digest-algo sha256 %%{__plaintext_filename}\n' \
            "$KEY_ID" > ~/.rpmmacros

      - name: Sign RPM
        run: |
          for rpm in dist/*.rpm; do
            rpmsign --addsign "$rpm"
            echo "Signed: $rpm"
          done

      - name: Verify RPM signature
        run: |
          rpm --import packaging/RPM-GPG-KEY-cap5
          for rpm in dist/*.rpm; do
            rpm --checksig "$rpm" && echo "OK: $rpm"
          done

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CAP5 ${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            dist/*.rpm
            dist/*.deb
            packaging/RPM-GPG-KEY-cap5
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Delete old releases (keep newest 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
          | while read -r tag; do
              echo "Deleting release $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done
